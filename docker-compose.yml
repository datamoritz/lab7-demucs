services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    mem_limit: 512m
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO bucket init (one-shot, exits after creating bucket) ──────────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_BUCKET:     ${MINIO_BUCKET:-demucs-bucket}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set public local/$$MINIO_BUCKET &&
        echo 'MinIO ready — bucket: '$$MINIO_BUCKET
      "
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

  # ── Caddy (HTTPS reverse proxy) ────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"            # Required for Let's Encrypt HTTP-01 challenge
      - "443:443"          # Public HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data   # TLS certificates (persists across restarts)
      - caddy-config:/config
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI REST API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./rest
      dockerfile: Dockerfile-rest
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:5001:5001"   # Localhost-only: for server-side curl tests
    environment:
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      MINIO_HOST:       minio
      MINIO_PORT:       9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_BUCKET:     ${MINIO_BUCKET:-demucs-bucket}
      MINIO_SECURE:     "false"
      REST_PORT:        5001
    depends_on:
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Demucs worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 3500m          # Hard cap — Demucs (htdemucs, CPU) peaks at ~2.5 GB
    stop_grace_period: 10m    # Let an in-progress Demucs job finish before shutdown
    environment:
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      MINIO_HOST:       minio
      MINIO_PORT:       9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_BUCKET:     ${MINIO_BUCKET:-demucs-bucket}
      MINIO_SECURE:     "false"
      OMP_NUM_THREADS:  "2"   # Prevent PyTorch spawning excessive OS threads
      MKL_NUM_THREADS:  "2"
    depends_on:
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  redis-data:    # Persists queue state across restarts
  minio-data:    # Persists all uploaded MP3s and separated stems
  caddy-data:    # TLS certificates — must persist or Caddy re-issues on every restart
  caddy-config:  # Caddy internal config cache
